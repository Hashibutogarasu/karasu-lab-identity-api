name: Deploy Identity API

on:
  release:
    types: [published]
  repository_dispatch:
    types: [release-published]
  workflow_dispatch:
    inputs:
      latest_only:
        description: 'latest タグのみプッシュ（バージョンタグをスキップ）'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            # GitHub ホスト型 ARM ネイティブランナー（QEMU 不要）
            # プライベートリポジトリの場合は ubuntu-latest + QEMU に戻すこと
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          # タグを付けずダイジェストのみプッシュ（後で merge ジョブでマニフェストを合成）
          outputs: type=image,name=hashibutogarasu/karasu-lab-api,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.suffix }}
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  push:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get package version
        id: pkg-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create and push manifest
        run: |
          DIGESTS=$(ls /tmp/digests | awk '{print "hashibutogarasu/karasu-lab-api@sha256:"$0}' | tr '\n' ' ')
          TAGS="-t hashibutogarasu/karasu-lab-api:latest"
          if [ "${{ inputs.latest_only }}" != "true" ]; then
            TAGS="$TAGS -t hashibutogarasu/karasu-lab-api:${{ steps.pkg-version.outputs.version }}"
          fi
          docker buildx imagetools create $TAGS $DIGESTS

  trigger-webhook:
    needs: push
    uses: ./.github/workflows/trigger-webhook.yml
    secrets: inherit
