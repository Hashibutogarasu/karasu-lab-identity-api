version: 2.0.0
services:
  app:
    container_name: karasu-lab-identity-api
    image: hashibutogarasu/karasu-lab-identity-api:0.0.1
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8083:8083'
    env_file:
      - .env.production
    volumes:
      - ./configs:/app/configs
    restart: always
